<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiFind — ATMs em Angola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<style>
  :root {
    --bg: #0c0f15;
    --surface: #14181f;
    --card: #1a1f28;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #e4e8ee;
    --muted: #7c8599;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --gray: #64748b;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: white;
  }

  .logo-text {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent); }

  .header-stats { display: flex; gap: 6px; align-items: center; }

  .stat-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--muted);
    background: var(--card);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .stat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .stat-dot.green { background: var(--green); }
  .stat-dot.red { background: var(--red); }
  .stat-dot.gray { background: var(--gray); }

  .header-actions { display: flex; gap: 6px; }

  .btn {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--card); color: var(--text); border-color: var(--border-hover); }

  .btn-accent {
    background: var(--accent);
    color: white;
  }

  .btn-accent:hover { background: var(--accent-hover); }
  .btn-accent.locating { opacity: 0.7; pointer-events: none; }

  .app-body { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 360px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 100;
  }

  .sidebar-top { padding: 14px; border-bottom: 1px solid var(--border); }

  .search-box { position: relative; margin-bottom: 10px; }

  .search-box svg {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    width: 14px; height: 14px;
  }

  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 10px 9px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }

  .filter-chip {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .filter-chip:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,0.08); }
  .filter-chip.active.all { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.06); }

  .bank-filter { padding: 10px 14px; border-bottom: 1px solid var(--border); }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .bank-chips { display: flex; gap: 4px; flex-wrap: wrap; }

  .bank-chip {
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    border: 1px solid transparent;
    opacity: 0.5;
    color: var(--muted);
  }

  .bank-chip.active { opacity: 1; border-color: var(--border-hover); color: var(--text); }
  .bank-chip:hover { opacity: 0.8; }

  .results-header {
    padding: 10px 14px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-count { font-size: 12px; color: var(--muted); }
  .results-count strong { color: var(--text); font-weight: 600; }

  .sort-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 3px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.12s;
  }

  .sort-btn:hover { color: var(--text); }

  .atm-list {
    flex: 1;
    overflow-y: auto;
    padding: 2px 14px 14px;
  }

  .atm-list::-webkit-scrollbar { width: 3px; }
  .atm-list::-webkit-scrollbar-track { background: transparent; }
  .atm-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
  * { scrollbar-width: thin; scrollbar-color: var(--border-hover) transparent; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .atm-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    animation: cardIn 0.2s ease-out both;
  }

  .atm-card:hover { border-color: var(--border-hover); background: #1e2530; }
  .atm-card.selected { border-color: var(--accent); background: rgba(59,130,246,0.06); }

  .atm-card-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }

  .bank-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .atm-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .atm-address {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .atm-address svg { width: 10px; height: 10px; flex-shrink: 0; }

  .atm-meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
  }

  .status-indicator {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .status-indicator .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .status-indicator .label { color: var(--muted); }

  .dist-tag {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    display: flex; align-items: center; gap: 3px;
  }

  .map-container { flex: 1; position: relative; background: #090b10; }

  #map { width: 100%; height: 100%; }

  .toast {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%) translateY(-70px);
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 12px;
    display: flex; align-items: center; gap: 7px;
    z-index: 900;
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .legend {
    position: absolute;
    bottom: 24px; left: 14px;
    z-index: 500;
    background: rgba(20,24,31,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    min-width: 160px;
  }

  .legend-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px;
    color: var(--text);
    margin-bottom: 5px;
  }

  .legend-item:last-child { margin-bottom: 0; }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .detail-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    padding: 16px 20px 20px;
    z-index: 600;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    max-height: 65%;
    overflow-y: auto;
  }

  .detail-panel.open { transform: translateY(0); }

  .panel-handle {
    width: 36px; height: 3px;
    background: var(--border-hover);
    border-radius: 2px;
    margin: 0 auto 14px;
  }

  .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }

  .panel-close {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    transition: all 0.12s;
  }

  .panel-close:hover { color: var(--text); border-color: var(--border-hover); }

  .panel-badge { margin-bottom: 3px; }

  .panel-name {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .panel-address { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 4px; }

  .panel-info { display: flex; gap: 10px; margin: 14px 0; flex-wrap: wrap; }

  .panel-info-item {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
  }

  .panel-info-item .ico { font-size: 13px; }

  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  .grid-cell { font-size: 12px; }
  .grid-label { color: var(--muted); margin-bottom: 1px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .grid-value { color: var(--text); font-weight: 500; }

  .panel-actions { display: flex; gap: 8px; margin-top: 14px; }

  .action-btn {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 5px;
    transition: all 0.12s;
  }

  .action-btn:hover { background: #1e2530; border-color: var(--border-hover); }
  .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .action-btn.primary:hover { background: var(--accent-hover); }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease-out;
  }

  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    padding: 22px;
    width: 400px;
    max-width: 90vw;
  }

  .modal-title {
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .modal-sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

  .radio-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }

  .radio-opt {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    font-size: 13px;
  }

  .radio-opt:hover { border-color: var(--border-hover); background: var(--card); }
  .radio-opt.selected { border-color: var(--accent); background: rgba(59,130,246,0.06); color: var(--accent); }

  .radio-icon { font-size: 16px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .atm-marker {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  .atm-marker:hover { transform: scale(1.15); }
  .atm-marker.m-dinheiro { background: rgba(34,197,94,0.85); border-color: #4ade80; }
  .atm-marker.m-sem-dinheiro { background: rgba(239,68,68,0.8); border-color: #f87171; }
  .atm-marker.m-dinheiro-papel { background: rgba(59,130,246,0.85); border-color: #60a5fa; }
  .atm-marker.m-papel { background: rgba(234,179,8,0.85); border-color: #fbbf24; }
  .atm-marker.m-quebrado { background: rgba(100,116,139,0.8); border-color: #94a3b8; }

  .my-location-marker {
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 5px rgba(59,130,246,0.2);
    animation: loc-pulse 2s infinite;
  }

  @keyframes loc-pulse {
    0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.35); }
    100% { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
  }

  .route-bar {
    display: none;
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    z-index: 600;
    background: var(--surface);
    border: 1px solid var(--border-hover);
    border-radius: var(--radius);
    padding: 10px 14px;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    max-width: 380px;
  }

  .route-bar-left { display: flex; align-items: center; gap: 10px; }
  .route-bar-icon { font-size: 16px; }
  .route-bar-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .route-bar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .route-bar-close {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    transition: all 0.12s;
  }
  .route-bar-close:hover { color: var(--text); border-color: var(--border-hover); }
  .route-bar-gmaps {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    transition: all 0.12s;
  }
  .route-bar-gmaps:hover { color: var(--accent); border-color: var(--accent); }

  .leaflet-routing-container { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; font-family: 'DM Sans', sans-serif !important; }
  .leaflet-routing-container h2 { color: var(--text) !important; font-size: 13px !important; }
  .leaflet-routing-container .leaflet-routing-alt { background: var(--surface) !important; color: var(--muted) !important; border-bottom: 1px solid var(--border) !important; }
  .leaflet-routing-container .leaflet-routing-alt table tr td { color: var(--text) !important; font-size: 12px !important; }
  .leaflet-routing-container .leaflet-routing-alt table tr td:first-child { color: var(--muted) !important; }
  .leaflet-routing-container .leaflet-routing-alt table tr:hover { background: var(--card) !important; }
  .leaflet-routing-container .leaflet-routing-geocoders { border-top: 1px solid var(--border) !important; }
  .leaflet-routing-container input { background: var(--card) !important; border: 1px solid var(--border) !important; color: var(--text) !important; border-radius: var(--radius-sm) !important; }
  .leaflet-routing-container .leaflet-routing-remove-waypoint { background: var(--card) !important; color: var(--muted) !important; }
  .leaflet-routing-collapse-btn { color: var(--muted) !important; }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--border-hover) !important;
    border-radius: var(--radius) !important;
    box-shadow: var(--shadow) !important;
    font-family: 'DM Sans', sans-serif !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--card) !important; }

  .mobile-only { display: none !important; }
  .desktop-only { display: flex !important; }

  @media (max-width: 768px) {
    .mobile-only { display: block !important; }
    .desktop-only { display: none !important; }

    .btn-label { display: none; }
    header { padding: 0 12px; height: 52px; }
    .header-actions { gap: 4px; }
    .header-stats { display: none; }

    .app-body { flex-direction: column; }

    .sidebar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      top: auto;
      width: 100%;
      height: auto;
      max-height: 85vh;
      z-index: 200;
      border-right: none;
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      transform: translateY(calc(100% - 140px));
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }

    .sidebar.open { transform: translateY(0); }

    .sidebar-handle {
      display: flex;
      justify-content: center;
      padding: 8px 0 4px;
      cursor: grab;
    }

    .sidebar-handle::after {
      content: '';
      width: 36px;
      height: 4px;
      background: var(--border-hover);
      border-radius: 2px;
    }

    .sidebar-top {
      padding: 0 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .search-box { margin-bottom: 8px; }

    .filter-row {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip { flex-shrink: 0; white-space: nowrap; }

    .bank-filter { display: none; }

    .results-header { padding: 8px 14px 4px; }

    .atm-list { max-height: calc(85vh - 220px); padding: 2px 14px 14px; }

    .map-container { position: absolute; inset: 52px 0 0; }
    .map-container.with-sheet { bottom: 140px; }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }

    .legend {
      bottom: 150px;

function debounce(fn, ms) {
  return function(...args) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => fn.apply(this, args), ms); };

function toggleSidebar() {
  const s = document.querySelector('.sidebar');
  const o = document.querySelector('.sidebar-overlay');
  const open = s.classList.toggle('open');
  if (o) o.classList.toggle('open', open);
  updateMapSheet();
}

function updateMapSheet() {
  const mc = document.querySelector('.map-container');
  const s = document.querySelector('.sidebar');
  if (!mc || !s) return;
  if (window.innerWidth <= 768 && s.classList.contains('open')) {
    mc.classList.add('with-sheet');
  } else {
    mc.classList.remove('with-sheet');
  }
}

  document.querySelector('.sidebar').classList.add('open');
  const o = document.querySelector('.sidebar-overlay');
  if (o) o.classList.add('open');
  updateMapSheet();
}

// Close sidebar
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  const o = document.querySelector('.sidebar-overlay');
  if (o) o.classList.remove('open');
  updateMapSheet();
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('sidebar-overlay')) {
    closeSidebar();
  }
});

// Click on sidebar handle to toggle
document.addEventListener('click', e => {
  const handle = e.target.closest('.sidebar-handle');
  if (handle) {
    const s = document.querySelector('.sidebar');
    if (s.classList.contains('open')) closeSidebar();
    else openSidebar();
  }
});

function initMap() {
  map = L.map('map', { center: [-8.836, 13.234], zoom: 13, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©CartoDB', maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  ATM_DATA.forEach(atm => addMarker(atm));
  updateStats();
  renderBankChips();
  renderList();
  if (window.innerWidth < 768) { legendVisible = false; document.getElementById('legend').style.display = 'none'; }
}

function getMarkerIcon(atm) {
  const s = STATUSES[atm.status];
  const div = document.createElement('div');
  div.className = `atm-marker m-${atm.status}`;
  div.style.background = s.color + 'dd';
  div.style.borderColor = s.color;
  div.textContent = atm.bank.substring(0,2);
  return L.divIcon({ html: div.outerHTML, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
}

function addMarker(atm) {
  const marker = L.marker([atm.lat, atm.lng], { icon: getMarkerIcon(atm) }).addTo(map).on('click', () => openDetail(atm));
  markers[atm.id] = marker;
}

function renderList() {
  const raw = document.getElementById('searchInput').value;
  const search = raw.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  let data = ATM_DATA.filter(a => {
    const mf = activeFilter === 'all' || a.status === activeFilter;
    const mb = !activeBank || a.bank === activeBank;
    const ms = !search || a.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(search) ||
      a.address.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(search);
    return mf && mb && ms;
  });

  if (currentSort === 'az') data.sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'status') {
    const ord = ['dinheiro-papel','dinheiro','papel','sem-dinheiro','quebrado'];
    data.sort((a,b) => ord.indexOf(a.status) - ord.indexOf(b.status));
  }

  if (userLocation) {
    data.forEach(a => { a._dist = Math.sqrt((a.lat-userLocation.lat)**2 + (a.lng-userLocation.lng)**2) * 111; });
    if (currentSort === 'dist') data.sort((a,b) => a._dist - b._dist);
  }

  document.getElementById('visibleCount').textContent = data.length;

  const list = document.getElementById('atmList');
  if (!data.length) {
    list.innerHTML = '<div style="text-align:center;padding:36px 16px;color:var(--muted);font-size:13px;">Nenhum ATM encontrado</div>';
    ATM_DATA.forEach(a => { if (markers[a.id]) map.removeLayer(markers[a.id]); });
    return;
  }

  list.innerHTML = data.map(atm => {
    const s = STATUSES[atm.status];
    const dist = atm._dist ? `${atm._dist.toFixed(1)} km` : '';
    return `<div class="atm-card ${selectedAtm?.id === atm.id ? 'selected' : ''}" onclick="openDetail(atmById(${atm.id})); focusMarker(${atm.id})">
      <div class="atm-card-header">
        <span class="bank-badge">${atm.bank}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:auto">${atm.updated}</span>
      </div>
      <div class="atm-name">${atm.name}</div>
      <div class="atm-address">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${atm.address}
      </div>
      <div class="atm-meta">
        <span class="status-indicator"><span class="dot" style="background:${s.color}"></span><span class="label">${s.label}</span></span>
        ${dist ? `<span class="dist-tag">📍 ${dist}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  ATM_DATA.forEach(a => {
    const v = data.find(d => d.id === a.id);
    if (markers[a.id]) { if (v) map.addLayer(markers[a.id]); else map.removeLayer(markers[a.id]); }
  });
}

function atmById(id) { return ATM_DATA.find(a => a.id === id); }
function focusMarker(id) { const a = atmById(id); if (a) map.flyTo([a.lat, a.lng], 16, { duration: 0.8 }); }

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (selectedAtm) closeDetail();
  renderList();
}

function renderBankChips() {
  const banks = [...new Set(ATM_DATA.map(a => a.bank))];
  document.getElementById('bankChips').innerHTML = banks.map(b =>
    `<button class="bank-chip ${activeBank === b ? 'active' : ''}" onclick="toggleBank('${b}')">${b}</button>`
  ).join('');
}

function toggleBank(bank) {
  activeBank = activeBank === bank ? null : bank;
  renderBankChips();
  if (selectedAtm) closeDetail();
  renderList();
}

function openDetail(atm) {
  selectedAtm = atm;
  clearRoute();
  if (window.innerWidth <= 768) { closeSidebar(); }
  const s = STATUSES[atm.status];
  const hasMoney = ['dinheiro','dinheiro-papel'].includes(atm.status);
  const hasPaper = ['papel','dinheiro-papel'].includes(atm.status);
  const isBroken = atm.status === 'quebrado';

  document.getElementById('panelContent').innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-badge"><span class="bank-badge">${atm.bank}</span></div>
        <div class="panel-name">${atm.name}</div>
        <div class="panel-address">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${atm.address}
        </div>
      </div>
      <button class="panel-close" onclick="closeDetail()">✕</button>
    </div>

    <div class="panel-info">
      <div class="panel-info-item"><span class="ico">${hasMoney ? '💵' : '❌'}</span> ${hasMoney ? 'Com dinheiro' : 'Sem dinheiro'}</div>
      <div class="panel-info-item"><span class="ico">${hasPaper ? '🧾' : '❌'}</span> ${hasPaper ? 'Papel disp.' : 'Sem papel'}</div>
      <div class="panel-info-item"><span class="ico">${!isBroken ? '✅' : '🔧'}</span> ${!isBroken ? 'Operacional' : 'Avariado'}</div>
    </div>

    <div class="panel-grid">
      <div class="grid-cell"><div class="grid-label">Horário</div><div class="grid-value">🕐 ${atm.horario}</div></div>
      <div class="grid-cell"><div class="grid-label">Actualização</div><div class="grid-value">⏱ ${atm.updated}</div></div>
      <div class="grid-cell"><div class="grid-label">Estado</div><div class="grid-value" style="color:${s.color}">${s.label}</div></div>
      <div class="grid-cell"><div class="grid-label">Rede</div><div class="grid-value">Multicaixa</div></div>
    </div>

    <div class="panel-actions">
      <button class="action-btn" onclick="openReport(${atm.id})">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Reportar
      </button>
      <button class="action-btn primary" onclick="getDirections(${atm.lat}, ${atm.lng}, '${atm.name}')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Ir para aqui
      </button>
    </div>`;

  document.getElementById('detailPanel').classList.add('open');
  renderList();
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedAtm = null;
  renderList();
}

function updateStats() {
  document.getElementById('count-operational').textContent = ATM_DATA.filter(a => ['dinheiro','dinheiro-papel'].includes(a.status)).length;
  document.getElementById('count-sem').textContent = ATM_DATA.filter(a => a.status === 'sem-dinheiro').length;
  document.getElementById('count-quebrado').textContent = ATM_DATA.filter(a => a.status === 'quebrado').length;
}

function getLocation() {
  const btn = document.getElementById('locateBtn');
  btn.classList.add('locating');
  showToast('📡', 'A obter localização...');
  if (!navigator.geolocation) { showToast('❌', 'Geolocalização não suportada'); btn.classList.remove('locating'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({ html: '<div class="my-location-marker"></div>', className: '', iconSize: [18,18], iconAnchor: [9,9] });
      userMarker = L.marker([userLocation.lat, userLocation.lng], { icon }).addTo(map).bindPopup('<b>📍 A sua localização</b>').openPopup();
      map.flyTo([userLocation.lat, userLocation.lng], 14, { duration: 1.2 });
      btn.classList.remove('locating');
      showToast('✅', 'Localização obtida');
      currentSort = 'dist';
      document.getElementById('sortLabel').textContent = 'Próximo';
      renderList();
    },
    err => {
      btn.classList.remove('locating');
      userLocation = { lat: -8.836, lng: 13.234 };
      showToast('📍', 'A usar localização simulada: Luanda Centro');
      currentSort = 'dist';
      document.getElementById('sortLabel').textContent = 'Próximo';
      renderList();
    }
  );
}

function showToast(icon, text) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleSort() {
  const opts = userLocation ? ['az','status','dist'] : ['az','status'];
  const labels = { az: 'A-Z', status: 'Estado', dist: 'Próximo' };
  const idx = opts.indexOf(currentSort);
  currentSort = opts[(idx+1) % opts.length];
  document.getElementById('sortLabel').textContent = labels[currentSort];
  renderList();
}

function toggleLegend() {
  legendVisible = !legendVisible;
  document.getElementById('legend').style.display = legendVisible ? 'block' : 'none';
}

function clearRoute() {
  if (routeControl) {
    map.removeControl(routeControl);
    routeControl = null;
  }
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  document.getElementById('routeInfo').style.display = 'none';
}

let routeLine = null;

function getDirections(lat, lng, atmName) {
  if (userLocation) {
    buildRoute(userLocation, lat, lng, atmName);
    return;
  }
  getLocation();
  showToast('📡', 'A obter localização para criar rota...');
  const check = setInterval(() => {
    if (userLocation) {
      clearInterval(check);
      buildRoute(userLocation, lat, lng, atmName);
    }
  }, 300);
  setTimeout(() => clearInterval(check), 10000);
}

function buildRoute(origin, destLat, destLng, atmName) {
  clearRoute();
  closeDetail();

  const dest = L.latLng(destLat, destLng);

  routeControl = L.Routing.control({
    waypoints: [L.latLng(origin.lat, origin.lng), dest],
    position: 'topleft',
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    fitSelectedRoutes: true,
    showAlternatives: false,
    lineOptions: { styles: [{ color: '#3b82f6', opacity: 0.8, weight: 4 }] },
    createMarker: () => null,
    router: L.Routing.osrmv1({
      serviceUrl: 'https://routing.openstreetmap.de/routed-car/',
      profile: 'driving',
      language: 'pt'
    })
  }).addTo(map);

  routeControl.on('routesfound', e => {
    const route = e.routes[0];
    const km = (route.summary.totalDistance / 1000).toFixed(1);
    const min = Math.round(route.summary.totalTime / 60);

    document.getElementById('routeDist').textContent = `${km} km`;
    document.getElementById('routeTime').textContent = `${min} min`;
    document.getElementById('routeEnd').textContent = atmName || 'ATM';
    document.getElementById('routeInfo').style.display = 'flex';

    const gmapsLink = document.getElementById('gmapsLink');
    gmapsLink.href = `https://www.google.com/maps/dir/${origin.lat},${origin.lng}/${destLat},${destLng}`;
    gmapsLink.style.display = 'flex';

    const container = routeControl.getContainer();
    if (container) container.style.display = 'block';
  });

  routeControl.on('routingerror', e => {
    console.warn('OSRM routing failed, using fallback:', e);
    showToast('⚠️', 'Rota detalhada indisponível, a usar distância directa');
    fallbackRoute(origin, destLat, destLng, atmName);
  });

  setTimeout(() => {
    if (routeControl && !document.querySelector('.leaflet-routing-container')) {
      fallbackRoute(origin, destLat, destLng, atmName);
    }
  }, 10000);
}

function fallbackRoute(origin, destLat, destLng, atmName) {
  clearRoute();
  const R = 6371;
  const dLat = (destLat - origin.lat) * Math.PI / 180;
  const dLng = (destLng - origin.lng) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(origin.lat * Math.PI / 180) * Math.cos(destLat * Math.PI / 180) * Math.sin(dLng/2)**2;
  const km = (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);

  routeLine = L.polyline([[origin.lat, origin.lng], [destLat, destLng]], {
    color: '#3b82f6', opacity: 0.5, weight: 3, dashArray: '8,8'
  }).addTo(map);
  map.fitBounds(routeLine.getBounds(), { padding: [50,50] });

  document.getElementById('routeDist').textContent = `${km} km`;
  document.getElementById('routeTime').textContent = '— min';
  document.getElementById('routeEnd').textContent = atmName || 'ATM';
  document.getElementById('routeInfo').style.display = 'flex';

  const gmapsLink = document.getElementById('gmapsLink');
  gmapsLink.href = `https://www.google.com/maps/dir/${origin.lat},${origin.lng}/${destLat},${destLng}`;
  gmapsLink.style.display = 'flex';

  L.marker([destLat, destLng], {
    icon: L.divIcon({
      html: '<div style="background:#3b82f6;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4)">📍</div>',
      className: '', iconSize: [24,24], iconAnchor: [12,12]
    })
  }).addTo(map);
}

function openReport(atmId) {
  reportAtmId = atmId;
  reportSelection = null;
  const atm = atmById(atmId);
  document.getElementById('reportAtmName').textContent = `Actualizar estado: ${atm.name}`;
  document.querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
  document.getElementById('reportModal').classList.add('open');
}

function selectReport(status, el) {
  reportSelection = status;
  document.querySelectorAll('.radio-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function closeModal() { document.getElementById('reportModal').classList.remove('open'); }

function submitReport() {
  if (!reportSelection) return;
  const atm = atmById(reportAtmId);
  if (!atm) return;
  atm.status = reportSelection;
  atm.updated = 'agora mesmo';
  map.removeLayer(markers[atm.id]);
  addMarker(atm);
  closeModal();
  updateStats();
  renderList();
  if (selectedAtm?.id === atm.id) openDetail(atm);
  showToast('✅', 'Relatório enviado! Obrigado.');
}

document.getElementById('searchInput').addEventListener('input', debounce(renderList, 300));

window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    document.querySelector('.sidebar').classList.remove('open');
    updateMapSheet();
  }
});

initMap();
// On mobile, start with the sheet collapsed showing the handle
if (window.innerWidth <= 768) {
  document.querySelector('.map-container').classList.add('with-sheet');
}
</script>
</body>
</html>
