<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiFind — ATMs em Angola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⌘</div>
    <span class="logo-text">Multi<span>Find</span></span>
  </div>

  <div class="header-stats">
    <div class="stat-pill"><div class="stat-dot green"></div><span id="count-operational">0</span></div>
    <div class="stat-pill"><div class="stat-dot red"></div><span id="count-sem">0</span></div>
    <div class="stat-pill"><div class="stat-dot gray"></div><span id="count-quebrado">0</span></div>
  </div>

  <div class="header-actions">
    <button class="btn btn-ghost mobile-only" onclick="openSidebar()" aria-label="Abrir lista">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <button class="btn btn-ghost" onclick="toggleLegend()" aria-label="Legenda">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span class="btn-label">Legenda</span>
    </button>
    <button class="btn btn-accent" id="locateBtn" onclick="getLocation()" aria-label="Localizar">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>
      <span class="btn-label">Localizar</span>
    </button>
  </div>
</header>

<div class="app-body">

  <aside class="sidebar">
    <div class="sidebar-handle"></div>
    <div class="sidebar-top">
      <div class="search-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" type="text" id="searchInput" placeholder="Pesquisar banco, bairro...">
      </div>
      <div class="filter-row">
        <button class="filter-chip all active" data-filter="all" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-chip" data-filter="dinheiro" onclick="setFilter('dinheiro', this)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block"></span>Com dinheiro</button>
        <button class="filter-chip" data-filter="dinheiro-papel" onclick="setFilter('dinheiro-papel', this)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--blue);display:inline-block"></span>Dinheiro+Papel</button>
        <button class="filter-chip" data-filter="papel" onclick="setFilter('papel', this)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--yellow);display:inline-block"></span>Só papel</button>
        <button class="filter-chip" data-filter="sem-dinheiro" onclick="setFilter('sem-dinheiro', this)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--red);display:inline-block"></span>Sem dinheiro</button>
        <button class="filter-chip" data-filter="quebrado" onclick="setFilter('quebrado', this)"><span class="dot" style="width:5px;height:5px;border-radius:50%;background:var(--gray);display:inline-block"></span>Avariado</button>
      </div>
    </div>

    <div class="bank-filter">
      <div class="section-label">Bancos</div>
      <div class="bank-chips" id="bankChips"></div>
    </div>

    <div class="results-header">
      <span class="results-count"><strong id="visibleCount">0</strong> ATMs</span>
      <button class="sort-btn" onclick="toggleSort()">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
        <span id="sortLabel">A-Z</span>
      </button>
    </div>

    <div class="atm-list" id="atmList"></div>
  </aside>

  <div class="sidebar-overlay"></div>

  <div class="map-container">
    <div id="map"></div>

    <div class="toast" id="toast">
      <span id="toastIcon">📍</span>
      <span id="toastText">A obter localização...</span>
    </div>

    <div class="legend" id="legend">
      <div class="legend-title">Estado</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Com dinheiro</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Dinheiro + Papel</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Só papel</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Sem dinheiro</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gray)"></div> Avariado</div>
    </div>

    <div class="route-bar" id="routeInfo">
      <div class="route-bar-left">
        <span class="route-bar-icon">📍</span>
        <div>
          <div class="route-bar-title">Rota</div>
          <div class="route-bar-sub"><span id="routeDist">0 km</span> · <span id="routeTime">0 min</span> · até <span id="routeEnd">ATM</span></div>
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <a id="gmapsLink" href="#" target="_blank" class="route-bar-gmaps" title="Abrir no Google Maps">🗺</a>
        <button class="route-bar-close" onclick="clearRoute()" aria-label="Fechar rota">✕</button>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="panel-handle"></div>
      <div id="panelContent"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="reportModal" role="dialog" aria-labelledby="reportTitle">
  <div class="modal">
    <div class="modal-title" id="reportTitle">Reportar estado</div>
    <div class="modal-sub" id="reportAtmName">Actualizar informação deste ATM</div>
    <div class="radio-group">
      <div class="radio-opt" onclick="selectReport('dinheiro', this)"><span class="radio-icon">💵</span> Com dinheiro</div>
      <div class="radio-opt" onclick="selectReport('dinheiro-papel', this)"><span class="radio-icon">💵🧾</span> Dinheiro + Papel</div>
      <div class="radio-opt" onclick="selectReport('papel', this)"><span class="radio-icon">🧾</span> Só papel</div>
      <div class="radio-opt" onclick="selectReport('sem-dinheiro', this)"><span class="radio-icon">❌</span> Sem dinheiro</div>
      <div class="radio-opt" onclick="selectReport('quebrado', this)"><span class="radio-icon">🔧</span> Avariado</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="submitReport()">Enviar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
